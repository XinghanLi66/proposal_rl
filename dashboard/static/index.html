<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>proposal_rl dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #141414; --card: #1e1e1e; --bord: #2e2e2e; --dim: #555;
  --txt: #d4d4d4; --head: #888; --green: #4ec94e; --yellow: #d4a017;
  --red: #e05252; --blue: #5599ee; --cyan: #4ec9b0;
  --ff: 'Menlo','Consolas','DejaVu Sans Mono',monospace;
}
body { background: var(--bg); color: var(--txt); font: 12px/1.5 var(--ff); }

/* tab bar */
#tab-bar {
  display: flex; align-items: center; padding: 0 8px;
  border-bottom: 1px solid var(--bord); background: #161616; overflow-x: auto;
}
.tab {
  padding: 6px 14px; cursor: pointer; color: var(--head); font-size: 11px;
  border-bottom: 2px solid transparent; white-space: nowrap; user-select: none; flex-shrink: 0;
}
.tab:hover { color: var(--txt); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }
#tab-meta { margin-left: auto; display: flex; gap: 8px; align-items: center; padding: 4px 0; flex-shrink: 0; }
#refresh-btn {
  cursor: pointer; color: var(--blue); background: none; border: 1px solid var(--blue);
  padding: 2px 8px; font: inherit; white-space: nowrap;
}
#clock { color: var(--dim); font-size: 11px; white-space: nowrap; }

/* layout */
.view { padding: 8px; display: grid; gap: 8px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.card { background: var(--card); border: 1px solid var(--bord); padding: 8px; }
.card-title {
  color: var(--head); font-size: 10px; text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 6px;
  border-bottom: 1px solid var(--bord); padding-bottom: 4px;
}

/* kv grid */
.kv { display: grid; grid-template-columns: max-content 1fr; gap: 2px 10px; }
.kv .k { color: var(--head); }

/* pills */
.pill { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.pill-running     { background: #2d4a2d; color: var(--green); }
.pill-done        { background: #2d3a50; color: var(--blue); }
.pill-pending     { background: #3a3a20; color: var(--yellow); }
.pill-interrupted { background: #3a2020; color: var(--red); }

/* progress bar */
.prog { background: #2a2a2a; border-radius: 2px; height: 4px; margin: 4px 0; overflow: hidden; }
.prog-fill { height: 100%; background: var(--blue); transition: width .3s; }
.prog-fill.done { background: var(--green); }

/* charts */
.chart-grid   { display: grid; gap: 8px; }
.chart-grid-4 { grid-template-columns: repeat(4, 1fr); }
.chart-grid-3 { grid-template-columns: repeat(3, 1fr); }
.chart-cell   { background: var(--card); border: 1px solid var(--bord); padding: 6px; }
.chart-label  { font-size: 10px; color: var(--head); margin-bottom: 4px; }

/* tables */
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { color: var(--head); font-weight: normal; text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--bord); }
td { padding: 3px 6px; border-bottom: 1px solid #252525; }
.best td { color: var(--green); }

.dim { color: var(--dim); font-style: italic; }
</style>
</head>
<body>

<div id="tab-bar">
  <div id="tab-meta">
    <button id="refresh-btn" onclick="fullRefresh()">↻ refresh</button>
    <span id="clock">–</span>
  </div>
</div>
<div id="views"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const CHARTS = {};          // chartId → Chart.js instance
const CHARTS_INIT = new Set(); // runIds whose charts have been initialized
let _runs = [];
let _activeId = null;

// ── Chart helpers ─────────────────────────────────────────────────────────────
const C = {
  reward: '#4ec94e', prs: '#5599ee', format: '#d4a017', kl: '#e05252',
  lr: '#888', clen: '#4ec9b0', loss: '#e05252', acc: '#4ec94e', entropy: '#c586c0',
};

function makeChart(id, label, color, ymin, ymax) {
  if (CHARTS[id]) CHARTS[id].destroy();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  CHARTS[id] = new Chart(ctx, {
    type: 'line',
    data: { datasets: [{ label, data: [], borderColor: color,
      backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2 }] },
    options: {
      responsive: true, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { type: 'linear', ticks: { color: '#555', maxTicksLimit: 5, font: { size: 9 } }, grid: { color: '#222' } },
        y: { min: ymin, max: ymax, ticks: { color: '#555', maxTicksLimit: 5, font: { size: 9 } }, grid: { color: '#222' } },
      }
    }
  });
}

function setData(id, data) {
  if (CHARTS[id]) { CHARTS[id].data.datasets[0].data = data; CHARTS[id].update('none'); }
}

function pts(metrics, key) {
  return metrics.filter(m => m._step != null && m[key] != null).map(m => ({ x: m._step, y: m[key] }));
}

// ── Render helpers ────────────────────────────────────────────────────────────
function pill(s) {
  return `<span class="pill pill-${s || 'pending'}">${s || 'pending'}</span>`;
}

function fmt(v) {
  if (v == null) return '<span class="dim">–</span>';
  return typeof v === 'number' ? v.toPrecision(4) : String(v);
}

function stageCardHTML(title, s) {
  if (!s) return `<div class="card-title">${title}</div><span class="dim">–</span>`;

  let prog = '';
  if (s.step != null && s.total_steps) {
    const p = Math.min(100, s.step / s.total_steps * 100).toFixed(0);
    prog = `<div class="prog"><div class="prog-fill ${s.status === 'done' ? 'done' : ''}" style="width:${p}%"></div></div>`;
  }

  // Live metrics (RL or SFT depending on what's present)
  let live = '';
  if (s.last_reward != null) live += `<span class="k">reward</span><span class="v">${fmt(s.last_reward)}</span>`;
  if (s.last_prs    != null) live += `<span class="k">PRS</span><span class="v">${fmt(s.last_prs)}</span>`;
  if (s.last_fas    != null) live += `<span class="k">FAS</span><span class="v">${fmt(s.last_fas)}</span>`;
  if (s.last_fmt    != null) live += `<span class="k">fmt</span><span class="v">${fmt(s.last_fmt)}</span>`;
  if (s.last_kl     != null) live += `<span class="k">KL</span><span class="v">${fmt(s.last_kl)}</span>`;
  if (s.last_loss   != null) live += `<span class="k">loss</span><span class="v">${fmt(s.last_loss)}</span>`;

  let evalHTML = '';
  const e = s.eval;
  if (e) {
    evalHTML = `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--bord)">
      <div class="k" style="color:var(--head);font-size:10px;margin-bottom:3px">eval  n=${e.n_examples ?? '?'}</div>
      <div class="kv">
        <span class="k">FAS</span><span class="v" style="color:var(--green)">${fmt(e.FAS)}</span>
        <span class="k">recall@50</span><span class="v">${fmt(e.recall_at_k)}</span>
        <span class="k">format</span><span class="v">${fmt(e.format_score)}</span>
      </div></div>`;
  }

  return `<div class="card-title">${title} ${pill(s.status)}</div>
    ${prog}
    <div class="kv">
      <span class="k">step</span><span class="v">${s.step ?? '–'} / ${s.total_steps ?? '–'}</span>
      <span class="k">eta</span><span class="v">${s.eta ?? '–'}</span>
      ${live}
      <span class="k">updated</span><span class="v">${s.last_update ?? '–'}</span>
    </div>${evalHTML}`;
}

function configCardHTML(run) {
  const c = run.config || {};
  return `<div class="card-title">config · <span style="color:var(--blue)">${run.type}</span></div>
    <div class="kv">
      <span class="k">strategy</span><span class="v">${c.strategy ?? '–'}</span>
      <span class="k">finetune</span><span class="v">${c.finetune_mode ?? '–'}</span>
      <span class="k">reward</span><span class="v">${c.reward_type ?? '–'}</span>
    </div>`;
}

function hparamCardHTML(hp) {
  if (!hp?.results?.length)
    return `<div class="card-title">hparam search</div><span class="dim">not run</span>`;
  const best = hp.best;
  const rows = hp.results.map(r => {
    const ib = best && r.lr === best.lr && r.kl === best.kl;
    return `<tr class="${ib ? 'best' : ''}">
      <td>${r.lr}</td><td>${r.kl}</td>
      <td>${r.mean_reward != null ? r.mean_reward.toFixed(4) : '–'}</td>
      <td>${r.steps}</td></tr>`;
  }).join('');
  return `<div class="card-title">hparam search${best ? ` — best lr=${best.lr} kl=${best.kl}` : ''}</div>
    <table><thead><tr><th>lr</th><th>kl</th><th>reward</th><th>steps</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function checkpointsCardHTML(cps) {
  if (!cps?.length)
    return `<div class="card-title">checkpoints</div><span class="dim">none yet</span>`;
  let bestFAS = -Infinity, bestIdx = -1;
  cps.forEach((c, i) => { if ((c.eval?.FAS ?? -Infinity) > bestFAS) { bestFAS = c.eval.FAS; bestIdx = i; } });
  const rows = cps.map((c, i) => `<tr class="${i === bestIdx && bestFAS > -Infinity ? 'best' : ''}">
    <td>${c.name}</td><td>${c.mtime}</td>
    <td>${c.eval?.FAS?.toFixed(4) ?? '–'}</td>
    <td>${c.eval?.recall_at_k?.toFixed(4) ?? '–'}</td>
    <td>${c.eval?.format_score?.toFixed(3) ?? '–'}</td>
  </tr>`).join('');
  return `<div class="card-title">checkpoints</div>
    <table><thead><tr><th>name</th><th>saved</th><th>FAS</th><th>recall@50</th><th>fmt</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

// ── DOM building (one-time per run) ───────────────────────────────────────────
function cid(runId, stage, name) { return `c-${runId}-${stage}-${name}`; }

function buildRunViewHTML(run) {
  const id = run.id;
  const hasSFT = run.type === 'sft' || run.type === 'sft_rl';
  const hasRL  = run.type === 'rl'  || run.type === 'sft_rl';

  // Top row: status card(s) + config + hparam
  const topRow = run.type === 'sft_rl'
    ? `<div class="row-3">
        <div class="card" id="sft-card-${id}"></div>
        <div class="card" id="rl-card-${id}"></div>
        <div class="card" id="cfg-card-${id}"></div>
      </div>`
    : hasRL
    ? `<div class="row-3">
        <div class="card" id="rl-card-${id}"></div>
        <div class="card" id="cfg-card-${id}"></div>
        <div class="card" id="hp-card-${id}"></div>
      </div>`
    : `<div class="row-2">
        <div class="card" id="sft-card-${id}"></div>
        <div class="card" id="cfg-card-${id}"></div>
      </div>`;

  // SFT curves (only if run has SFT)
  const sftCharts = !hasSFT ? '' : `
    <div class="card">
      <div class="card-title">SFT training curves</div>
      <div class="chart-grid chart-grid-3">
        <div class="chart-cell"><div class="chart-label">Loss</div>
          <canvas id="${cid(id,'sft','loss')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">Token accuracy</div>
          <canvas id="${cid(id,'sft','acc')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">LR</div>
          <canvas id="${cid(id,'sft','lr')}" height="100"></canvas></div>
      </div>
    </div>`;

  // RL curves (only if run has RL)
  const rlCharts = !hasRL ? '' : `
    <div class="card">
      <div class="card-title">RL training curves</div>
      <div class="chart-grid chart-grid-4">
        <div class="chart-cell"><div class="chart-label">Reward</div>
          <canvas id="${cid(id,'rl','reward')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">PRS / FAS</div>
          <canvas id="${cid(id,'rl','prs')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">Format reward</div>
          <canvas id="${cid(id,'rl','fmt')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">KL</div>
          <canvas id="${cid(id,'rl','kl')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">LR</div>
          <canvas id="${cid(id,'rl','lr')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">Completion length</div>
          <canvas id="${cid(id,'rl','clen')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">Clipped ratio</div>
          <canvas id="${cid(id,'rl','clip')}" height="100"></canvas></div>
        <div class="chart-cell"><div class="chart-label">Entropy</div>
          <canvas id="${cid(id,'rl','entropy')}" height="100"></canvas></div>
      </div>
    </div>`;

  return `<div class="view" id="view-${id}" style="display:none">
    ${topRow}${sftCharts}${rlCharts}
    <div class="card" id="cp-card-${id}">
      <div class="card-title">checkpoints</div><span class="dim">loading…</span>
    </div>
  </div>`;
}

// Initialize Chart.js instances for a run (called lazily on first tab switch)
function initRunCharts(run) {
  if (CHARTS_INIT.has(run.id)) return;
  CHARTS_INIT.add(run.id);
  const id = run.id;
  const hasSFT = run.type === 'sft' || run.type === 'sft_rl';
  const hasRL  = run.type === 'rl'  || run.type === 'sft_rl';
  if (hasSFT) {
    makeChart(cid(id,'sft','loss'), 'loss', C.loss);
    makeChart(cid(id,'sft','acc'),  'acc',  C.acc,  0, 1);
    makeChart(cid(id,'sft','lr'),   'LR',   C.lr);
  }
  if (hasRL) {
    makeChart(cid(id,'rl','reward'),  'reward',  C.reward);
    makeChart(cid(id,'rl','prs'),     'PRS/FAS', C.prs,    0, 1);
    makeChart(cid(id,'rl','fmt'),     'format',  C.format, 0, 1);
    makeChart(cid(id,'rl','kl'),      'KL',      C.kl);
    makeChart(cid(id,'rl','lr'),      'LR',      C.lr);
    makeChart(cid(id,'rl','clen'),    'length',  C.clen);
    makeChart(cid(id,'rl','clip'),    'clipped', C.kl,     0, 1);
    makeChart(cid(id,'rl','entropy'), 'entropy', C.entropy);
  }
}

// ── Tab structure (rebuild when run list changes) ─────────────────────────────
const tabBar   = document.getElementById('tab-bar');
const tabMeta  = document.getElementById('tab-meta');
const viewsDiv = document.getElementById('views');

function buildTabStructure(runs) {
  // Destroy existing charts
  Object.keys(CHARTS).forEach(id => { CHARTS[id]?.destroy(); delete CHARTS[id]; });
  CHARTS_INIT.clear();
  // Remove existing tabs and views
  document.querySelectorAll('.run-tab').forEach(el => el.remove());
  viewsDiv.innerHTML = '';

  for (const run of runs) {
    const tab = document.createElement('div');
    tab.className = 'tab run-tab';
    tab.id = `tab-${run.id}`;
    tab.dataset.id = run.id;
    tab.title = run.id;  // full ID as tooltip
    tab.textContent = run.label;
    tab.onclick = () => switchTab(run.id);
    tabBar.insertBefore(tab, tabMeta);

    viewsDiv.insertAdjacentHTML('beforeend', buildRunViewHTML(run));
  }
}

// ── Summary updates (in-place, no DOM rebuild) ────────────────────────────────
function updateSummaries(runs) {
  for (const run of runs) {
    const id = run.id;
    const hasSFT = run.type === 'sft' || run.type === 'sft_rl';
    const hasRL  = run.type === 'rl'  || run.type === 'sft_rl';

    const sftEl = document.getElementById(`sft-card-${id}`);
    if (sftEl) sftEl.innerHTML = stageCardHTML('SFT', run.sft);

    const rlEl = document.getElementById(`rl-card-${id}`);
    if (rlEl) rlEl.innerHTML = stageCardHTML('RL', run.rl);

    const cfgEl = document.getElementById(`cfg-card-${id}`);
    if (cfgEl) cfgEl.innerHTML = configCardHTML(run);

    const hpEl = document.getElementById(`hp-card-${id}`);
    if (hpEl) hpEl.innerHTML = hparamCardHTML(run.hparam_search);

    // Checkpoints come from whichever stage exists
    const cpEl = document.getElementById(`cp-card-${id}`);
    if (cpEl) {
      const cps = hasRL ? (run.rl?.checkpoints ?? []) : (run.sft?.checkpoints ?? []);
      cpEl.innerHTML = checkpointsCardHTML(cps);
    }
  }
}

// ── Tab switching + curve loading ─────────────────────────────────────────────
function switchTab(runId) {
  _activeId = runId;
  document.querySelectorAll('.run-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.id === runId));
  document.querySelectorAll('.view').forEach(v =>
    v.style.display = v.id === `view-${runId}` ? '' : 'none');

  const run = _runs.find(r => r.id === runId);
  if (run) {
    initRunCharts(run);  // no-op if already initialized
    loadCurves(run);
  }
}

async function loadCurves(run) {
  const id = run.id;
  const hasSFT = run.type === 'sft' || run.type === 'sft_rl';
  const hasRL  = run.type === 'rl'  || run.type === 'sft_rl';

  const curves = await fetchJSON(`/api/runs/${id}/curves`);

  if (hasSFT) {
    const sm = curves.sft || [];
    setData(cid(id,'sft','loss'), pts(sm, 'loss'));
    setData(cid(id,'sft','acc'),  pts(sm, 'mean_token_accuracy'));
    setData(cid(id,'sft','lr'),   pts(sm, 'learning_rate'));
  }
  if (hasRL) {
    const rm = curves.rl || [];
    // Use PRS key if available, fall back to FAS
    const prsKey = rm.some(m => m['rewards/reward_prs/mean'] != null)
      ? 'rewards/reward_prs/mean' : 'rewards/reward_fas/mean';
    setData(cid(id,'rl','reward'),  pts(rm, 'reward'));
    setData(cid(id,'rl','prs'),     pts(rm, prsKey));
    setData(cid(id,'rl','fmt'),     pts(rm, 'rewards/reward_format/mean'));
    setData(cid(id,'rl','kl'),      pts(rm, 'kl'));
    setData(cid(id,'rl','lr'),      pts(rm, 'learning_rate'));
    setData(cid(id,'rl','clen'),    pts(rm, 'completions/mean_length'));
    setData(cid(id,'rl','clip'),    pts(rm, 'completions/clipped_ratio'));
    setData(cid(id,'rl','entropy'), pts(rm, 'entropy'));
  }
}

// ── Main refresh ──────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
  const text = await r.text();
  try { return JSON.parse(text); }
  catch (e) { throw new Error(`${url} returned non-JSON (got: ${text.slice(0, 60)}…)`); }
}

async function fullRefresh() {
  document.getElementById('clock').textContent = 'refreshing…';
  document.getElementById('refresh-btn').disabled = true;
  try {
    const newRuns = await fetchJSON('/api/runs');
    if (!newRuns?.length) {
      viewsDiv.innerHTML = '<div style="padding:24px;color:var(--dim)">No runs found in runs/</div>';
      return;
    }
    const oldIds = _runs.map(r => r.id).join(',');
    const newIds = newRuns.map(r => r.id).join(',');
    if (oldIds !== newIds) {
      buildTabStructure(newRuns);
    }
    _runs = newRuns;
    updateSummaries(_runs);

    // Activate the previously active run (or the last one in the list)
    const toActivate = _runs.find(r => r.id === _activeId) ? _activeId : _runs[_runs.length - 1].id;
    switchTab(toActivate);
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById('clock').textContent = 'error: ' + err.message;
  }
  document.getElementById('refresh-btn').disabled = false;
}

// Initial load + periodic refresh
fullRefresh();
setInterval(async () => {
  try {
    const newRuns = await fetchJSON('/api/runs');
    if (!newRuns?.length) return;
    const oldIds = _runs.map(r => r.id).join(',');
    const newIds = newRuns.map(r => r.id).join(',');
    if (oldIds !== newIds) buildTabStructure(newRuns);
    _runs = newRuns;
    updateSummaries(_runs);
    const run = _runs.find(r => r.id === _activeId);
    if (run) loadCurves(run);
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  } catch (_) { /* silent */ }
}, 30000);
</script>
</body>
</html>
